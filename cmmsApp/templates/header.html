<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{% static 'css/demo_form.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/header.css' %}">
</head>

<body>
  {% include 'request_demo_modal.html' %}

  <header class="header">
    <nav class="nav container" aria-label="Primary">
      <div class="nav__data">
        <a href="#home" class="nav__logo" data-scroll-to>
          <img src="{% static 'images/logo.png' %}" alt="Company Logo" class="logo-img">
        </a>

        <button class="nav__toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" type="button">
          <i class="ri-menu-line nav__burger"></i>
          <i class="ri-close-line nav__close"></i>
        </button>
      </div>

      <div class="nav__menu" id="nav-menu">
        <ul class="nav__list">
          <li class="dropdown__item">
            <a href="#services" class="nav__link" data-scroll-to>We Provide</a>
          </li>

          <li class="dropdown__item">
            <a href="#why-us" class="nav__link" data-scroll-to>Our Expertise</a>
          </li>

          <li class="dropdown__item">
            <a href="#projects" class="nav__link" data-scroll-to>Projects</a>
          </li>

          <li class="dropdown__item">
            <a href="#about-us" class="nav__link" data-scroll-to>About Us</a>
          </li>

          <li class="dropdown__item">
            <a href="#contact" class="nav__link" data-scroll-to>Contact</a>
          </li>

          <li class="dropdown__item nav__cta-item">
            <button type="button" class="book-demo-btn js-open-demo" data-scroll-to data-target="#request-demo">
              Submit Inquiry
            </button>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <script src="{% static 'js/header.js' %}"></script>
  <script defer src="{% static 'js/demo_form.js' %}"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const header = document.querySelector('.header');
      const nav = document.querySelector('.nav');
      const navMenu = document.getElementById('nav-menu');
      const navToggle = document.getElementById('nav-toggle');
      const links = document.querySelectorAll('[data-scroll-to]');

      function headerOffset() {
        return header ? header.offsetHeight : 0;
      }

      function smoothScrollTo(id) {
        const target = id ? document.querySelector(id) : null;
        if (!target) return;

        const y = target.getBoundingClientRect().top + window.pageYOffset - headerOffset();
        window.scrollTo({ top: y, behavior: 'smooth' });
      }

      function openMenu() {
        if (!navMenu) return;
        navMenu.classList.add('show-menu');
        nav?.classList.add('show-icon');
        document.body.classList.add('no-scroll');
        navToggle?.setAttribute('aria-expanded', 'true');
      }

      function closeMenu() {
        if (!navMenu) return;
        navMenu.classList.remove('show-menu');
        nav?.classList.remove('show-icon');
        document.body.classList.remove('no-scroll');
        navToggle?.setAttribute('aria-expanded', 'false');
      }

      function setActiveOnScroll() {
        const sections = document.querySelectorAll('section[id]');
        let current = '';

        sections.forEach((sec) => {
          const secTop = sec.offsetTop - headerOffset() - 20;
          const secHeight = sec.offsetHeight;

          if (window.pageYOffset >= secTop && window.pageYOffset < secTop + secHeight) {
            current = sec.getAttribute('id');
          }
        });

        document.querySelectorAll('.nav__link').forEach((a) => {
          const href = a.getAttribute('href');
          a.classList.toggle('active-link', href === `#${current}`);
        });
      }

      links.forEach((el) => {
        el.addEventListener('click', function (e) {
          const targetSel = el.getAttribute('href') || el.dataset.target;
          if (!targetSel || !targetSel.startsWith('#')) return;

          e.preventDefault();

          if (targetSel === '#request-demo') {
            closeMenu();
            return;
          }

          smoothScrollTo(targetSel);
          closeMenu();
        });
      });

      navToggle?.addEventListener('click', function (e) {
        e.stopPropagation();
        const isOpen = navMenu.classList.contains('show-menu');
        isOpen ? closeMenu() : openMenu();
      });

      document.addEventListener('click', function (e) {
        if (!nav?.contains(e.target) && navMenu?.classList.contains('show-menu')) {
          closeMenu();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });

      window.addEventListener('scroll', setActiveOnScroll);

      window.addEventListener('load', function () {
        if (window.location.hash) {
          setTimeout(() => smoothScrollTo(window.location.hash), 100);
        }
        setActiveOnScroll();
      });
    });
  </script>
</body>
</html>
